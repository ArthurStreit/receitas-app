services:
  jenkins:
    build:
      context: .
      dockerfile: docker/jenkins/Dockerfile

    restart: unless-stopped

    ports:
      - "8080:8080"

    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/receitas-secrets:/run/receitas-secrets:ro

    group_add:
      - "${DOCKER_GID}"

volumes:
  jenkins_home: