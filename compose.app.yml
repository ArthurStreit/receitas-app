services:
  app:
    image: ${APP_IMAGE}
    restart: unless-stopped

    ports:
      - "${APP_PORT}:80"

    environment:
      APP_NAME: ${APP_NAME}
      APP_ENV: ${APP_ENV}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG}
      APP_URL: ${APP_URL}

      LOG_CHANNEL: stack

      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

      CACHE_DRIVER: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync

    depends_on:
      db:
        condition: service_healthy

    healthcheck:
      test:
        - CMD-SHELL
        - curl --fail --silent http://localhost/login > /dev/null || exit 1
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  db:
    image: mysql:8.0
    restart: unless-stopped

    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}

    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

    volumes:
      - db_data:/var/lib/mysql

    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD} --silent
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

volumes:
  db_data: